version: 0.0

os: linux

files:
  - source: /
    destination: /home/ec2-user

hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 120
      runas: root

  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 120
      runas: root

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 90
      runas: ec2-user

  ValidateService:
    - location: scripts/validate.sh
      timeout: 60
      runas: ec2-user

  # Blue/Green Deployment Hooks
  BeforeAllowTraffic:
    - location: scripts/before_allow_traffic.sh
      timeout: 60
      runas: ec2-user

  AfterAllowTraffic:
    - location: scripts/after_allow_traffic.sh
      timeout: 60
      runas: ec2-user
