version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "Installing dependencies..."
      - pip install -r app/requirements.txt
      - pip install pytest requests bandit coverage safety awscli boto3

  pre_build:
    commands:
      - echo "=== Running UNIT tests ==="
      - coverage run -m pytest tests/test_app.py
      - coverage report
      - coverage xml

      # Coverage quality gate
      - COVERAGE=$(coverage report | grep TOTAL | awk '{print $4}' | sed 's/%//')
      - if [ "$COVERAGE" -lt 80 ]; then echo "Coverage below 80%! Failing."; exit 1; fi

  build:
    commands:
      - echo "=== Starting application for integration tests ==="
      - python app/app.py &   # or flask run / uvicorn main:app
      - |
        until curl -s http://localhost:5000/health; do
          echo "Waiting for app to be ready..."
          sleep 2
        done

      - echo "=== Running INTEGRATION tests ==="
      - pytest tests/integration/

      - echo "=== Packaging artifact ==="
      - rm -rf build
      - mkdir -p build/app
      - cp -r app/ build/app/
      - if [ -f cicd/appspecs/appspec.yml ]; then cp cicd/appspecs/appspec.yml build/; fi
      - cp -r cicd/scripts build/scripts

  post_build:
    commands:
      - echo "=== Running Security Scans ==="

      # Bandit - Python code security scanning
      - echo "Running Bandit..."
      - bandit -r app/ -f json -o bandit-output.json || true
      - bandit -r app/ -f txt || true

      # Safety - Python dependency vulnerability scanning
      - echo "Running Safety..."
      - safety scan --output json > safety-output.json || true
      - safety scan || true

      - echo "=== Evaluating Quality Gates ==="

      # Bandit quality gate (fail on HIGH)
      - |
        if [ -f bandit-output.json ]; then
          HIGH=$(grep -c '"issue_severity": "HIGH"' bandit-output.json || echo "0")
          MEDIUM=$(grep -c '"issue_severity": "MEDIUM"' bandit-output.json || echo "0")

          echo "Bandit Results:"
          echo "  HIGH severity issues: $HIGH"
          echo "  MEDIUM severity issues: $MEDIUM"

          if [ "$HIGH" -gt 0 ]; then
            echo "QUALITY GATE FAILED: High severity security vulnerabilities found!"
            exit 1
          fi
        else
          echo "Warning: bandit-output.json not found"
        fi

      # Safety quality gate (fail on any vulnerabilities, and print JSON)
      - |
        if [ -f safety-output.json ]; then
          VULN_COUNT=$(grep -c '"vulnerability"' safety-output.json || echo "0")

          echo "Safety Results:"
          echo "  Known vulnerabilities: $VULN_COUNT"

          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "QUALITY GATE FAILED: Known vulnerabilities in dependencies!"
            cat safety-output.json
            exit 1
          fi
        else
          echo "Warning: safety-output.json not found"
        fi

      # AWS Inspector scan (if configured)
      - |
        if [ -f cicd/scripts/inspector_scan.sh ]; then
          echo "Running AWS Inspector scan..."
          bash cicd/scripts/inspector_scan.sh || echo "Inspector scan completed with warnings"
        else
          echo "Inspector scan script not found, skipping..."
        fi

      - echo "All security scans passed!"


artifacts:
  base-directory: build
  files:
    - '**/*'
