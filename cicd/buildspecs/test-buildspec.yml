version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "Installing test dependencies..."
      - pip install pytest requests

  build:
    commands:
      - |
        set -e

        echo "=== Integration Test Stage ==="
        echo "Working directory:"
        pwd
        echo "Contents:"
        ls -la

        echo "=== Locating application from build artifacts ==="

        # build_output is the secondary artifact
        BUILD_DIR="$CODEBUILD_SRC_DIR_build_output"

        if [ -d "$BUILD_DIR/app/app" ]; then
          APP_DIR="$BUILD_DIR/app/app"
        elif [ -d "$BUILD_DIR/app" ]; then
          APP_DIR="$BUILD_DIR/app"
        else
          echo "ERROR: Application directory not found in build_output"
          echo "Contents of build_output:"
          ls -la "$BUILD_DIR"
          exit 1
        fi

        echo "Application directory resolved to: $APP_DIR"

        echo "=== Installing application dependencies ==="
        cd "$APP_DIR"
        pip install -r requirements.txt

        echo "=== Starting application ==="
        nohup python3 app.py > /tmp/app.log 2>&1 &

        echo "=== Waiting for application health ==="
        until curl -s http://localhost:5000/health; do
          echo "Waiting for app..."
          sleep 2
        done

        echo "Application is healthy"

        echo "=== Running integration tests ==="
        export APP_URL="http://localhost:5000"

        cd "$CODEBUILD_SRC_DIR"

        if [ -d "tests/integration" ]; then
          TEST_DIR="tests/integration"
        else
          echo "ERROR: tests/integration directory not found"
          pwd
          ls -la
          exit 1
        fi

        pytest "$TEST_DIR" -v --tb=short --junitxml=test-results.xml

        echo "=== Stopping application ==="
        pkill -f "python3 app.py" || true

        echo "=== Integration tests completed successfully ==="

artifacts:
  files:
    - test-results.xml
